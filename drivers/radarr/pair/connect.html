<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      padding: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #FFC230;
      border-radius: 50%;
      padding: 14px;
      color: #fff;
    }

    h2 {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      font-size: 13px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: #3b82f6;
    }

    input.error {
      border-color: #ef4444;
    }

    input.success {
      border-color: #22c55e;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: -10px;
      margin-bottom: 14px;
    }

    .status-box {
      display: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .status-box.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
    }

    .status-box.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #15803d;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-test {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    #btn-test:not(:disabled):hover {
      background: #e5e7eb;
    }

    #btn-next {
      background: #3b82f6;
      color: #fff;
    }

    #btn-next:not(:disabled):hover {
      background: #2563eb;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 1024 1024" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
      <defs>
        <rect width="1024" height="1024" id="rr_artboard" />
        <clipPath id="rr_clip">
          <use xlink:href="#rr_artboard" clip-rule="evenodd" />
        </clipPath>
      </defs>
      <g clip-path="url(#rr_clip)">
        <g transform="translate(70 21.00012)">
          <path d="M105.302 154.943L112.824 869.492C52.651 877.014 7.52158 846.927 7.52158 786.755L0 192.55C0 4.51106 172.996 -40.6184 278.298 34.5974L812.33 342.982C887.546 395.633 902.589 493.413 864.981 561.107C857.46 508.456 834.895 478.37 789.765 448.284L188.039 109.813C142.91 79.7268 105.302 87.2484 105.302 154.943Z" fill="currentColor"/>
          <path d="M0 376.079C45.1295 391.122 90.259 383.6 127.867 361.036L744.636 0C782.244 52.651 774.723 105.302 729.593 135.388L210.604 436.251C135.388 473.859 37.6079 436.251 0 376.079Z" transform="translate(60.17249 531.0214)" fill="currentColor"/>
          <path d="M0 413.687L368.557 203.083L7.52157 0L0 413.687Z" transform="translate(240.6902 282.8092)" fill="currentColor"/>
        </g>
      </g>
    </svg>
  </div>
  <h2 id="title"></h2>
  <p class="subtitle" id="subtitle"></p>

  <label for="host" id="label-host"></label>
  <input id="host" type="text" autocomplete="off" spellcheck="false" />
  <p class="hint" id="hint-host"></p>

  <label for="apiKey" id="label-apikey"></label>
  <input id="apiKey" type="password" autocomplete="off" />

  <div id="status" class="status-box"></div>

  <div class="actions">
    <button id="btn-test" type="button"></button>
    <button id="btn-next" type="button" disabled></button>
  </div>

  <script>
    const hostInput  = document.getElementById('host');
    const keyInput   = document.getElementById('apiKey');
    const statusBox  = document.getElementById('status');
    const btnTest    = document.getElementById('btn-test');
    const btnNext    = document.getElementById('btn-next');

    // Apply translations
    document.getElementById('title').textContent          = Homey.__('pair.radarr.title');
    document.getElementById('subtitle').textContent       = Homey.__('pair.radarr.subtitle');
    document.getElementById('label-host').textContent     = Homey.__('pair.connect.label_host');
    document.getElementById('hint-host').textContent      = Homey.__('pair.radarr.hint_host');
    document.getElementById('label-apikey').textContent   = Homey.__('pair.connect.label_apikey');
    hostInput.placeholder                                  = Homey.__('pair.radarr.placeholder_host');
    keyInput.placeholder                                   = Homey.__('pair.connect.placeholder_apikey');
    btnTest.textContent                                    = Homey.__('pair.connect.btn_test');
    btnNext.textContent                                    = Homey.__('pair.connect.btn_next');

    function setStatus(type, message) {
      statusBox.className = 'status-box ' + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = 'status-box';
      statusBox.textContent = '';
    }

    function setInputState(inputEl, state) {
      inputEl.classList.remove('error', 'success');
      if (state) inputEl.classList.add(state);
    }

    function setLoading(loading) {
      btnTest.disabled = loading;
      if (loading) {
        btnTest.innerHTML = '<span class="spinner"></span>' + Homey.__('pair.connect.btn_testing');
      } else {
        btnTest.textContent = Homey.__('pair.connect.btn_test');
      }
    }

    async function testConnection() {
      const host   = hostInput.value.trim();
      const apiKey = keyInput.value.trim();

      if (!host) {
        setInputState(hostInput, 'error');
        setStatus('error', Homey.__('pair.connect.error_host_required'));
        hostInput.focus();
        return;
      }

      if (!apiKey) {
        setInputState(keyInput, 'error');
        setStatus('error', Homey.__('pair.connect.error_apikey_required'));
        keyInput.focus();
        return;
      }

      clearStatus();
      setInputState(hostInput, null);
      setInputState(keyInput, null);
      btnNext.disabled = true;
      setLoading(true);

      try {
        const result = await Homey.emit('test_connection', { host, apiKey });
        setInputState(hostInput, 'success');
        setInputState(keyInput, 'success');
        setStatus('success', Homey.__('pair.connect.success_connected', { appName: result.appName, version: result.version }));
        btnNext.disabled = false;
      } catch (err) {
        setInputState(hostInput, 'error');
        setInputState(keyInput, 'error');
        setStatus('error', err.message || Homey.__('pair.connect.error_connection_failed'));
        btnNext.disabled = true;
      } finally {
        setLoading(false);
      }
    }

    btnTest.addEventListener('click', testConnection);

    btnNext.addEventListener('click', () => {
      Homey.nextView();
    });

    keyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') testConnection();
    });

    function onInputChange() {
      btnNext.disabled = true;
      setInputState(hostInput, null);
      setInputState(keyInput, null);
      clearStatus();
    }

    hostInput.addEventListener('input', onInputChange);
    keyInput.addEventListener('input', onInputChange);
  </script>
</body>
</html>
