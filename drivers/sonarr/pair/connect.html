<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      padding: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #00ccff;
      border-radius: 50%;
      padding: 14px;
      color: #fff;
    }

    h2 {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      font-size: 13px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: #3b82f6;
    }

    input.error {
      border-color: #ef4444;
    }

    input.success {
      border-color: #22c55e;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: -10px;
      margin-bottom: 14px;
    }

    .status-box {
      display: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .status-box.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
    }

    .status-box.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #15803d;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-test {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    #btn-test:not(:disabled):hover {
      background: #e5e7eb;
    }

    #btn-next {
      background: #3b82f6;
      color: #fff;
    }

    #btn-next:not(:disabled):hover {
      background: #2563eb;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 512 512" style="width:100%;height:100%;">
      <path d="m459.7 100.3-52.9 52.9c-30.9 30.9-33.6 57.8-33.6 105.3 0 42.3 6.7 81.1 38.2 112.6 23 23 44.9 44.7 44.9 44.7-5.9 7.2-12.3 14.3-19.1 21.2-1.7 2-3.5 3.8-5.5 5.4-6 5.9-12.2 11.4-18.6 16.4l-41.4-41.4C334.9 380.6 305.6 377 257 377c-46.7 0-78.4 4.3-112.6 38.5-20.4 20.4-43.8 43.9-43.8 43.9-8.9-6.8-17.3-14.2-25.3-22.4-6.6-6.6-12.8-13.4-18.5-20.3 0 0 23.1-23.2 45.2-45.3 32.7-32.7 38-70.6 38-113 0-41.3-6.8-79.8-36.8-109.9C82.2 127.7 53.3 99 53.3 99c6.7-8.5 14-16.7 21.8-24.5 6.9-6.8 14-13.1 21.2-19l48 48c30.7 30.7 70 38.6 112.4 38.6 43.6 0 82.8-8.4 114.7-40.4C391 82.1 417 56.3 417 56.3c6.8 5.6 13.5 11.6 20.1 18.2 8.3 8.3 15.8 16.9 22.6 25.8" style="fill-rule:evenodd;clip-rule:evenodd;fill:currentColor"/>
      <path d="M186 269.1c-.5-2.8-.8-5.5-.9-8.4-.1-1.6-.1-3.1-.1-4.7 0-1.7 0-3.2.1-4.7 0-.2 0-.3.1-.5 1-17.4 7.9-32.4 20.5-45.1 13.9-13.8 30.6-20.7 50.2-20.7s36.3 6.9 50.2 20.7c13.8 14 20.7 30.8 20.7 50.3s-6.9 36.2-20.7 50.2c-.5.5-1 1.1-1.5 1.5q-3.45 3.3-7.2 6-18 13.2-41.4 13.2c-23.4 0-29.4-4.4-41.3-13.2-3.1-2.2-6.1-4.7-8.9-7.6-10.8-10.6-17.3-22.9-19.8-37" style="fill-rule:evenodd;clip-rule:evenodd;fill:currentColor"/>
    </svg>
  </div>
  <h2 id="title"></h2>
  <p class="subtitle" id="subtitle"></p>

  <label for="host" id="label-host"></label>
  <input id="host" type="text" autocomplete="off" spellcheck="false" />
  <p class="hint" id="hint-host"></p>

  <label for="apiKey" id="label-apikey"></label>
  <input id="apiKey" type="password" autocomplete="off" />

  <div id="status" class="status-box"></div>

  <div class="actions">
    <button id="btn-test" type="button"></button>
    <button id="btn-next" type="button" disabled></button>
  </div>

  <script>
    const hostInput  = document.getElementById('host');
    const keyInput   = document.getElementById('apiKey');
    const statusBox  = document.getElementById('status');
    const btnTest    = document.getElementById('btn-test');
    const btnNext    = document.getElementById('btn-next');

    // Apply translations
    document.getElementById('title').textContent          = Homey.__('pair.connect.title');
    document.getElementById('subtitle').textContent       = Homey.__('pair.connect.subtitle');
    document.getElementById('label-host').textContent     = Homey.__('pair.connect.label_host');
    document.getElementById('hint-host').textContent      = Homey.__('pair.connect.hint_host');
    document.getElementById('label-apikey').textContent   = Homey.__('pair.connect.label_apikey');
    hostInput.placeholder                                  = Homey.__('pair.connect.placeholder_host');
    keyInput.placeholder                                   = Homey.__('pair.connect.placeholder_apikey');
    btnTest.textContent                                    = Homey.__('pair.connect.btn_test');
    btnNext.textContent                                    = Homey.__('pair.connect.btn_next');

    function setStatus(type, message) {
      statusBox.className = 'status-box ' + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = 'status-box';
      statusBox.textContent = '';
    }

    function setInputState(inputEl, state) {
      inputEl.classList.remove('error', 'success');
      if (state) inputEl.classList.add(state);
    }

    function setLoading(loading) {
      btnTest.disabled = loading;
      if (loading) {
        btnTest.innerHTML = '<span class="spinner"></span>' + Homey.__('pair.connect.btn_testing');
      } else {
        btnTest.textContent = Homey.__('pair.connect.btn_test');
      }
    }

    async function testConnection() {
      const host   = hostInput.value.trim();
      const apiKey = keyInput.value.trim();

      if (!host) {
        setInputState(hostInput, 'error');
        setStatus('error', Homey.__('pair.connect.error_host_required'));
        hostInput.focus();
        return;
      }

      if (!apiKey) {
        setInputState(keyInput, 'error');
        setStatus('error', Homey.__('pair.connect.error_apikey_required'));
        keyInput.focus();
        return;
      }

      clearStatus();
      setInputState(hostInput, null);
      setInputState(keyInput, null);
      btnNext.disabled = true;
      setLoading(true);

      try {
        const result = await Homey.emit('test_connection', { host, apiKey });
        setInputState(hostInput, 'success');
        setInputState(keyInput, 'success');
        setStatus('success', Homey.__('pair.connect.success_connected', { appName: result.appName, version: result.version }));
        btnNext.disabled = false;
      } catch (err) {
        setInputState(hostInput, 'error');
        setInputState(keyInput, 'error');
        setStatus('error', err.message || Homey.__('pair.connect.error_connection_failed'));
        btnNext.disabled = true;
      } finally {
        setLoading(false);
      }
    }

    btnTest.addEventListener('click', testConnection);

    btnNext.addEventListener('click', () => {
      Homey.nextView();
    });

    keyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') testConnection();
    });

    function onInputChange() {
      btnNext.disabled = true;
      setInputState(hostInput, null);
      setInputState(keyInput, null);
      clearStatus();
    }

    hostInput.addEventListener('input', onInputChange);
    keyInput.addEventListener('input', onInputChange);
  </script>
</body>
</html>
